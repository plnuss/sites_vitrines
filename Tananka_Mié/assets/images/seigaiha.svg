<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 120 60">
  <!-- Motif seigaiha (vagues) japonais, tuilé, très discret -->
  <defs>
    <g id="wave" stroke="#8A8B5C" stroke-width="1" fill="none" opacity="0.22">
      <circle cx="30" cy="30" r="28"/>
      <circle cx="30" cy="30" r="20"/>
      <circle cx="30" cy="30" r="12"/>
      <circle cx="30" cy="30" r="4"/>
    </g>
  </defs>
  <use href="#wave" x="-30" y="0"/>
  <use href="#wave" x="30"  y="0"/>
  <use href="#wave" x="90"  y="0"/>
  <use href="#wave" x="0"   y="30"/>
  <use href="#wave" x="60"  y="30"/>
  <use href="#wave" x="-60" y="30"/>
  <use href="#wave" x="120" y="30"/>
</svg>
